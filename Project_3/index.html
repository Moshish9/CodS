<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Calculator</title>

<style>
* {
  margin : 0 ;
  padding : 0 ;
  box-sizing : border-box ;
  font-family : "Segoe UI" , sans-serif ;
}

body {
  height : 100vh ;
  display : flex ;
  justify-content : center ;
  align-items : center ;
  background : #0f172a ;
  overflow : hidden ;
}

.bg span {
  position : absolute ;
  width : 300px ;
  height : 300px ;
  border-radius : 50% ;
  filter : blur(120px) ;
  animation : float 10s infinite alternate ;
}

.bg span:nth-child(1) {
  background : rgba(0 , 255 , 255 , 0.4) ;
  top : 10% ;
  left : 10% ;
}

.bg span:nth-child(2) {
  background : rgba(255 , 0 , 255 , 0.4) ;
  bottom : 10% ;
  right : 10% ;
}

.bg span:nth-child(3) {
  background : rgba(0 , 255 , 150 , 0.4) ;
  top : 50% ;
  left : 50% ;
}

@keyframes float {
  from { transform : translateY(0px) translateX(0px) ; }
  to { transform : translateY(60px) translateX(40px) ; }
}

.calculator {
  position : relative ;
  width : 340px ;
  padding : 20px ;
  border-radius : 20px ;
  background : rgba(255 , 255 , 255 , 0.05) ;
  backdrop-filter : blur(20px) ;
  box-shadow : 0 20px 60px rgba(0 , 0 , 0 , 0.6) ;
}

.display {
  width : 100% ;
  height : 70px ;
  border : none ;
  border-radius : 12px ;
  background : rgba(0 , 0 , 0 , 0.7) ;
  color : #00ffff ;
  font-size : 28px ;
  text-align : right ;
  padding : 15px ;
  margin-bottom : 20px ;
}

.buttons {
  display : grid ;
  grid-template-columns : repeat(4 , 1fr) ;
  gap : 15px ;
}

button {
  height : 60px ;
  border : none ;
  border-radius : 12px ;
  background : rgba(255 , 255 , 255 , 0.08) ;
  color : white ;
  font-size : 18px ;
  cursor : pointer ;
  transition : all 0.25s ease ;
}

button:hover {
  transform : translateY(-4px) scale(1.05) ;
  background : rgba(0 , 255 , 255 , 0.2) ;
}

.op { background : rgba(255 , 165 , 0 , 0.3) ; }
.equal { grid-column : span 2 ; background : linear-gradient(45deg , #00c6ff , #0072ff) ; }
.clear { background : rgba(255 , 0 , 0 , 0.4) ; }

</style>
</head>
<body>

<div class="bg">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="calculator">
  <input id="display" class="display" type="text" disabled />

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button class="op" onclick="append('%')">%</button>
    <button class="op" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="op" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="op" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="op" onclick="append('+')">+</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
const display = document.getElementById("display") ;

function append(value) {
  display.value += value ;
}

function clearDisplay() {
  display.value = "" ;
}

function deleteLast() {
  display.value = display.value.slice(0 , -1) ;
}

function calculate() {
  try {
    display.value = eval(display.value) ;
  } catch {
    display.value = "Error" ;
  }
}



document.addEventListener("keydown" , (e) => {
  if ((e.key >= "0" && e.key <= "9") || ["+" , "-" , "*" , "/" , "." , "%"].includes(e.key)) {
    append(e.key) ;
  } else if (e.key === "Enter") {
    calculate() ;
  } else if (e.key === "Backspace") {
    deleteLast() ;
  } else if (e.key === "Escape") {
    clearDisplay() ;
  }
}) ;
</script>

</body>
</html>
